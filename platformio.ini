[env:esp32-s3-devkitm-1]
platform = espressif32     ; ESP32 development platform
board = esp32-s3-devkitm-1 ; Development board model
framework = arduino        ; Use the Arduino framework
monitor_speed = 115200     ; Serial monitor baud rate

; Library dependencies (automatically downloaded)
lib_deps =
    adafruit/Adafruit ST7735 and ST7789 Library  ; Display driver library
    adafruit/Adafruit GFX Library                ; Graphics library
    SPI                                          ; SPI communication library (required by the display)
    knolleary/PubSubClient                       ; MQTT client library
